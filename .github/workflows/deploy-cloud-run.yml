name: Deploy Cloud Run

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build image
        run: docker build --no-cache -t asia-northeast1-docker.pkg.dev/ice-sh/ice-report/report-generator:${{ github.sha }} .

      - name: Push image
        run: docker push asia-northeast1-docker.pkg.dev/ice-sh/ice-report/report-generator:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy report-generator \
            --image asia-northeast1-docker.pkg.dev/ice-sh/ice-report/report-generator:${{ github.sha }} \
            --region asia-northeast1 \
            --memory 2Gi \
            --service-account ice-report-runner@ice-sh.iam.gserviceaccount.com \
            --allow-unauthenticated

      - name: Run read-only operational check
        shell: pwsh
        run: ./scripts/run-operations-readonly-scheduled.ps1

      - name: Upload read-only check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operations-readonly-check-${{ github.run_id }}
          path: artifacts/operations-readonly/
          if-no-files-found: warn
