name: Operations Read-Only Check

on:
  workflow_dispatch:
  schedule:
    # 10:00 JST every Monday.
    - cron: "0 1 * * 1"

concurrency:
  group: operations-readonly-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run read-only operational check
        shell: pwsh
        run: ./scripts/run-operations-readonly-scheduled.ps1

      - name: Upload read-only check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operations-readonly-check-${{ github.run_id }}
          path: artifacts/operations-readonly/
          if-no-files-found: warn
