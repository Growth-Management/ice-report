# ICE Report Generator environment sample.
# Copy to env.yaml for local/private use. Do not commit env.yaml.
# Production secrets must be stored in Secret Manager and injected into Cloud Run.

# Runtime identity / GCP
PROJECT_ID: "ice-sh"
GOOGLE_CLOUD_PROJECT: "ice-sh"
BIGQUERY_PROJECT_ID: "jumpplus-4a5f4"
SECRET_PROJECT_ID: "ice-sh"

# Flask / local development
FLASK_APP: "app"
MAIL_PROVIDER: "logging"
ADMIN_AUTH_FAIL_CLOSED: "1"
ADMIN_API_KEY: "replace-with-local-admin-key"
OTP_HASH_SECRET: "replace-with-local-otp-hash-secret"

# Report generation
BUCKET_NAME: "replace-with-report-bucket"
OBJECT_PREFIX: "reports/plus"
OUTPUT_DIR: "/tmp/report_output"
TEMPLATE_PATH: "templates/template.xlsx"

# Public download / delivery runtime
PUBLIC_BASE_URL: "https://example.run.app"
DEFAULT_EXPIRES_DAYS: "7"
DOWNLOAD_SIGNED_URL_SECONDS: "300"
SIGNED_URL_SERVICE_ACCOUNT: "ice-report-runner@ice-sh.iam.gserviceaccount.com"

# Firestore collections
DELIVERIES_COLLECTION: "deliveries"
DOWNLOAD_LOGS_COLLECTION: "download_logs"
OTP_COLLECTION: "otp_challenges"
DOWNLOAD_SESSIONS_COLLECTION: "download_sessions"
OTP_RATE_LIMIT_COLLECTION: "otp_rate_limits"
SECURITY_EVENTS_COLLECTION: "security_events"
ADMIN_AUDIT_LOGS_COLLECTION: "admin_audit_logs"

# OTP session / rate limit
OTP_TTL_MINUTES: "10"
OTP_PIN_LENGTH: "6"
OTP_MAX_ATTEMPTS: "5"
OTP_RESEND_COOLDOWN_SECONDS: "60"
DOWNLOAD_SESSION_TTL_MINUTES: "15"
DOWNLOAD_SESSION_ONE_TIME: "true"
OTP_RATE_LIMIT_WINDOW_MINUTES: "15"
OTP_RATE_LIMIT_MAX_REQUESTS: "5"

# Slack notification
SLACK_WEBHOOK_SECRET_NAME: "slack-download-webhook-url"
# SLACK_WEBHOOK_URL is only for local testing. Prefer Secret Manager.
SLACK_WEBHOOK_URL: ""

# SES production mail provider. Use with MAIL_PROVIDER=ses.
AWS_SES_ROLE_ARN: "arn:aws:iam::123456789012:role/example-ses-role"
AWS_SES_WEB_IDENTITY_AUDIENCE: "sts.amazonaws.com"
AWS_SES_REGION: "ap-northeast-1"
AWS_SES_FROM_ADDRESS: "noreply@example.com"
AWS_SES_FROM_NAME: "ICE Report Generator"
AWS_SES_CONFIGURATION_SET: ""
AWS_SES_ROLE_SESSION_NAME: "ice-report-ses"
AWS_SES_ROLE_SESSION_DURATION_SECONDS: "900"
AWS_SES_TIMEOUT_SECONDS: "10"
MAIL_REPLY_TO_EMAILS: ""
MAIL_SERVICE_NAME: "ICE Report Generator"
MAIL_DELIVERY_MAX_ATTEMPTS: "2"
MAIL_DELIVERY_RETRY_BASE_SECONDS: "0.5"

# Do not add long-lived AWS access keys here.
# AWS_SES_ACCESS_KEY_ID and AWS_SES_SECRET_ACCESS_KEY are legacy and not used
# by the production route.
